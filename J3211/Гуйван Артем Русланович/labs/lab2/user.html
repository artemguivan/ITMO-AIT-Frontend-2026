<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Личный кабинет</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Agentics</a>
    <div>
      <a class="btn btn-outline-light" href="search-page.html">Поиск</a>
      <a class="btn btn-outline-light ms-2" href="leaderboard.html">LLM Arena</a>
      <button class="btn btn-outline-light ms-2" type="button" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>
<div class="container my-4">
  <h2>Личный кабинет</h2>
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="experiments"></div>
</div>
<div class="modal fade" id="expModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Детали эксперимента</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modal-body">Логи, метрики, артефакты</div>
      </div>
    </div>
  </div>
</div>
<script src="api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
requireAuth()

const experimentsContainer = document.getElementById('experiments')
let experiments = []

function showExperiment(id) {
  const experiment = experiments.find(function (item) { return item.id === id })

  if (!experiment) return

  document.getElementById('modal-body').innerHTML = `
    <p><strong>Model:</strong> ${experiment.model}</p>
    <p><strong>Metric:</strong> ${experiment.metricName} ${experiment.metric}</p>
    <p><strong>Time:</strong> ${experiment.date} ${experiment.time}</p>
    <p><strong>Duration:</strong> ${experiment.duration}</p>
    <p><strong>Dataset:</strong> ${experiment.dataset}</p>
    <p><strong>Artifacts:</strong> ${experiment.artifacts.join(', ')}</p>
  `
}

function renderExperiments(items) {
  experimentsContainer.innerHTML = items.map(function (experiment) {
    return `
      <div class="col">
        <div class="card h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${experiment.name}</h5>
            <p class="card-text">
              Model: ${experiment.model}<br>
              Metric: ${experiment.metric}<br>
              Time: ${experiment.date} ${experiment.time}<br>
              Tags: ${experiment.tags.join(', ')}
            </p>
            <button class="btn btn-primary mt-auto" data-bs-toggle="modal" data-bs-target="#expModal" onclick="showExperiment(${experiment.id})">Подробнее</button>
          </div>
        </div>
      </div>
    `
  }).join('')
}

async function loadExperiments() {
  experiments = await request('/experiments')
  renderExperiments(experiments)
}

loadExperiments()
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Поиск экспериментов</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Agentics</a>
    <div>
      <a class="btn btn-outline-light" href="user.html">Личный кабинет</a>
      <a class="btn btn-outline-light ms-2" href="leaderboard.html">LLM Arena</a>
      <button class="btn btn-outline-light ms-2" type="button" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>
<div class="container my-4">
  <h2>Поиск</h2>
  <form class="row g-3 mb-4">
    <div class="col-md-4">
      <label for="date" class="form-label">Дата</label>
      <input type="date" class="form-control" id="date">
    </div>
    <div class="col-md-4">
      <label for="metric" class="form-label">Метрика</label>
      <input type="text" class="form-control" id="metric" placeholder="accuracy > 0.9">
    </div>
    <div class="col-md-4">
      <label for="tag" class="form-label">Тег</label>
      <input type="text" class="form-control" id="tag" placeholder="baseline">
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-primary">Найти</button>
      <button type="reset" class="btn btn-outline-secondary ms-2">Сбросить</button>
    </div>
  </form>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="experiments"></div>
  <div class="alert alert-warning mt-4 d-none" id="empty-message">Эксперименты не найдены</div>
  <div class="alert alert-danger mt-4 d-none" id="api-error">Не удалось загрузить эксперименты</div>
</div>

<script src="api.js"></script>
<script>
requireAuth()

const form = document.querySelector('form')
const dateInput = document.getElementById('date')
const metricInput = document.getElementById('metric')
const tagInput = document.getElementById('tag')
const experimentsContainer = document.getElementById('experiments')
const emptyMessage = document.getElementById('empty-message')
const apiError = document.getElementById('api-error')
let experiments = []

function parseMetricFilter(value) {
  const trimmed = value.trim().toLowerCase().replace(/^metric\s*/, '').replace(/^accuracy\s*/, '')

  if (!trimmed) {
    return function () { return true }
  }

  const match = trimmed.match(/^(>=|<=|>|<|=)?\s*(\d+(?:\.\d+)?)$/)

  if (!match) {
    return function () { return false }
  }

  const operator = match[1] || '='
  const target = Number(match[2])

  return function (metric) {
    if (operator === '>') return metric > target
    if (operator === '>=') return metric >= target
    if (operator === '<') return metric < target
    if (operator === '<=') return metric <= target
    return metric === target
  }
}

function renderExperiments(items) {
  experimentsContainer.innerHTML = items.map(function (experiment) {
    return `
      <div class="col">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title">${experiment.name}</h5>
            <p class="card-text">
              Date: ${experiment.date}<br>
              Model: ${experiment.model}<br>
              Metric: ${experiment.metric}<br>
              Tags: ${experiment.tags.join(', ')}
            </p>
          </div>
        </div>
      </div>
    `
  }).join('')

  emptyMessage.classList.toggle('d-none', items.length > 0)
}

async function loadExperiments() {
  try {
    experiments = await request('/experiments')
    renderExperiments(experiments)
  } catch (error) {
    apiError.classList.remove('d-none')
  }
}

function applyFilters() {
  const date = dateInput.value
  const tag = tagInput.value.trim().toLowerCase()
  const matchesMetric = parseMetricFilter(metricInput.value)

  const filtered = experiments.filter(function (experiment) {
    const matchesDate = !date || experiment.date === date
    const matchesTag = !tag || experiment.tags.some(function (item) {
      return item.toLowerCase().includes(tag)
    })

    return matchesDate && matchesTag && matchesMetric(experiment.metric)
  })

  renderExperiments(filtered)
}

form.addEventListener('submit', function (event) {
  event.preventDefault()
  applyFilters()
})

form.addEventListener('reset', function () {
  setTimeout(applyFilters)
})

loadExperiments()
</script>
</body>
</html>

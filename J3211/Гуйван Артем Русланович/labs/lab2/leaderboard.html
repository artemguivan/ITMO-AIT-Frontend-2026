<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Arena</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="user.html">Agentics</a>
    <div>
      <a class="btn btn-outline-light" href="user.html">Личный кабинет</a>
      <a class="btn btn-outline-light ms-2" href="search-page.html">Поиск</a>
      <button class="btn btn-outline-light ms-2" type="button" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>

<main class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h2 mb-1">LLM Arena</h1>
      <p class="text-muted mb-0">Данные с llmarena.ru</p>
    </div>
    <button class="btn btn-primary" type="button" id="refresh">Обновить</button>
  </div>

  <div class="alert alert-danger d-none" id="api-error">Не удалось загрузить рейтинг моделей</div>
  <div class="alert alert-info" id="loading-message">Загрузка данных...</div>

  <form class="row g-3 align-items-end mb-3" id="limit-form">
    <div class="col-sm-4 col-md-3">
      <label class="form-label" for="models-limit">Показать первых N моделей</label>
      <input class="form-control" id="models-limit" type="number" min="1" value="10">
    </div>
    <div class="col-sm-8 col-md-9">
      <div class="text-muted" id="models-count">Модели еще не загружены</div>
    </div>
  </form>

  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead>
      <tr>
        <th>Rank</th>
        <th>Model</th>
        <th>Arena Elo</th>
        <th>95% CI</th>
        <th>Votes</th>
        <th>Organization</th>
        <th>License</th>
      </tr>
      </thead>
      <tbody id="models-table"></tbody>
    </table>
  </div>
</main>

<script src="api.js"></script>
<script>
requireAuth()

const modelsTable = document.getElementById('models-table')
const apiError = document.getElementById('api-error')
const loadingMessage = document.getElementById('loading-message')
const modelsLimitInput = document.getElementById('models-limit')
const modelsCount = document.getElementById('models-count')
let arenaModels = []

function renderModels(models) {
  const limit = Number(modelsLimitInput.value) || models.length
  const visibleModels = models.slice(0, limit)

  modelsCount.textContent = 'Показано ' + visibleModels.length + ' из ' + models.length

  modelsTable.innerHTML = visibleModels.map(function (model) {
    return `
      <tr>
        <td>${model.rank}</td>
        <th>${model.name}</th>
        <td>${model.arenaElo}</td>
        <td>${model.confidenceInterval}</td>
        <td>${model.votes.toLocaleString('ru-RU')}</td>
        <td>${model.organization}</td>
        <td>${model.license}</td>
      </tr>
    `
  }).join('')
}

async function loadModels() {
  apiError.classList.add('d-none')
  loadingMessage.classList.remove('d-none')

  try {
    arenaModels = await request('/arenaModels')
    modelsLimitInput.max = arenaModels.length
    renderModels(arenaModels)
  } catch (error) {
    apiError.classList.remove('d-none')
  } finally {
    loadingMessage.classList.add('d-none')
  }
}

modelsLimitInput.addEventListener('input', function () {
  renderModels(arenaModels)
})
document.getElementById('refresh').addEventListener('click', loadModels)
loadModels()
</script>
</body>
</html>
